name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: windows-latest
    env:
      LICENSE_SECRET: ${{ secrets.LICENSE_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Build release binary
        run: cargo build --release

      # WiX 3 ships pre-installed on GitHub Windows runners.
      # cargo-wix wraps candle.exe / light.exe from that installation.
      - name: Install cargo-wix
        run: cargo install cargo-wix --locked --version "0.3.8"

      - name: Build MSI installer
        run: cargo wix --no-build --nocapture

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked --version "0.11.3"

      - name: Build MSIX (Microsoft Store)
        run: cargo packager --release --verbose

      - name: Rename artifacts
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"

          $exe_src = "target\release\neat_disk.exe"
          $exe_dst = "NeatDisk-$version-x64.exe"
          Copy-Item $exe_src $exe_dst

          # cargo-wix outputs to target\wix\neat_disk-*.msi
          $msi = Get-ChildItem "target\wix\*.msi" | Select-Object -First 1
          $msi_dst = "NeatDisk-$version-x64.msi"
          Copy-Item $msi.FullName $msi_dst

          # cargo-packager outputs to dist\
          $msix = Get-ChildItem "dist\*.msix" | Select-Object -First 1
          $msix_dst = "NeatDisk-$version-x64.msix"
          Copy-Item $msix.FullName $msix_dst

          echo "EXE=$exe_dst" >> $env:GITHUB_ENV
          echo "MSI=$msi_dst" >> $env:GITHUB_ENV
          echo "MSIX=$msix_dst" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ env.EXE }}
            ${{ env.MSI }}
            ${{ env.MSIX }}
